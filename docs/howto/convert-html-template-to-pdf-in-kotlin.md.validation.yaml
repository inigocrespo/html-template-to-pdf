recommendations:
  - priority: low
    action: "Add a note about token syntax constraint in Section 3 (Inject dynamic data)"
    rationale: "Token syntax ({{\\w+}} only, no hyphens/dots) is a subtle constraint that causes silent failures if violated. Placing a callout near the placeholder examples prevents mistakes."
    status: "FIXED 2026-03-18"
    fix_applied: "Added blockquote callout before multi-variable example in Section 3, documenting that only word characters (letters, digits, underscores) are valid in placeholder names. Example given: {{client-name}} invalid, use {{clientName}} instead."

  - priority: low
    action: "Link to a test file example for custom renderer testing (optional)"
    rationale: "Advanced users may want to inject a test double. This is non-essential for the core howto but could be a forward link to a reference section."
    example: "See [Reference: Testing with Custom Renderers] for injecting a test double."

  - priority: medium
    action: "Expand Section 4 (Write the PDF to a file) with Ktor example"
    rationale: "Spring Boot is only one framework; Ktor is equally common in Kotlin. Adding a Ktor example increases coverage of practical scenarios."
    example: |
      Or, in Ktor:
      get("/export") {
          val html = "<html><body><h1>Export</h1></body></html>"
          val pdf = htmlToPdf(html)
          call.respondBytes(pdf.readBytes(), ContentType.Application.Pdf, HttpStatusCode.OK)
      }

